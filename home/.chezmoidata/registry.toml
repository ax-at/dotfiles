# ============================================================================
# registry.toml  --  single source of truth for this machine
# ----------------------------------------------------------------------------
# Every package is one [[packages]] block. To add a tool: append a block.
# To drop a tool: set enabled = false, OR delete the block. The apply scripts then
# UNINSTALL it (it stays documented in TOOLS.md only while the block exists).
# enabled = false means "ensure removed", not just "don't install" — same for
# turning its [modules] toggle off. Deleting a block also uninstalls, provided the
# entry was present on a prior apply: brew/cask/npm/script each record what they
# installed in per-method state manifests, so a deleted entry can still be removed.
# The one gap: an entry added AND deleted between two applies was never recorded, so
# it lingers (remove by hand). mas apps are never auto-uninstalled (no headless
# uninstall) — remove them manually.
#
# Fields:
#   name          display name
#   module        grouping; installed only if [modules].<module> is true
#   desc          one-line description (used in TOOLS.md)
#   cost          free | freemium | paid   (free-first: paid defaults to disabled)
#   license       SPDX id or "proprietary"
#   repo          GitHub URL if OSS, else ""
#   enabled       master on/off; false => uninstall on next apply
#   platforms     subset of ["macos","linux"]
#   <os>          per-OS install table: { method, pkg | cmd | id, check?, uninstall_cmd? }
#                 method = brew | cask | mas | npm | script | apt | dnf
#                 uninstall_cmd  REQUIRED for method = script (brew/npm/cask
#                   uninstall generically). Single-line shell, eval'd to remove
#                   the tool. Artifacts-only: delete the binary/install dir, leave
#                   user config/data. Not templated ({{ }} won't render here).
#
# Module toggles below are DEFAULTS; .chezmoi.toml.tmpl init-prompts can
# override react-native / ai-tools / linux-feel per machine.
# ============================================================================

[modules]
core = true
fonts = true
editors = true
web = true
databases = true
cloud = true
react-native = true
ai-tools = true
ai-assistants = true
ai-productivity-tools = true
nanoclaw = false
productivity = true
linux-feel = true
macos-defaults = true

