# ============================================================================
# skills.toml  --  curated set of agent skills installed globally on this machine
# ----------------------------------------------------------------------------
# Installed by run_onchange_after_65-agent-skills.sh via the `skills` CLI
# (`npx skills`, https://github.com/vercel-labs/skills). Skills are installed at
# GLOBAL scope (`-g`) and SYMLINKED (the CLI default): the real files live once
# in the universal store (~/.agents/skills) and every other agent symlinks to it.
#
# `agents` below is the DEFAULT target set every repo installs to. It is
# independent of which agent CLIs are actually installed -- a skill is placed in
# an agent's global skills dir whether or not that agent exists yet.
#
# Each [[repos]] block is ONE source repo (TOML array-of-tables). Fields:
#   repo   source the CLI clones from. Usually "owner/repo"; may be any git
#          source the CLI accepts (full URL, GitLab, direct path) -- use a
#          branch URL to pin, since the CLI has no @tag/#ref syntax.
#   skills the skill NAMES within that repo to install. Each name is the identity
#          key used for install AND removal AND the applied-manifest, so a name
#          must be UNIQUE across the whole file (not just within its repo).
#   agents OPTIONAL per-REPO override. Omitted -> the block installs to every
#          agent in the top-level `agents` list. Present -> only to those agents.
#
# GRANULARITY: agents are chosen per REPO, not per individual skill. Every skill
# in a block shares that block's agent set. If one skill needs a different set,
# give it its own [[repos]] block (as the better-auth fork below does).
#
# Installs are BATCHED: one `npx skills add <repo> -s <skills...> -a <agents...>`
# per repo (one clone, not one-per-skill-per-agent). The script RECONCILES against
# on-disk reality (`skills list -g --json`) plus a manifest at
# ~/.local/state/dotfiles/skills.applied:
#   - adding a skill/repo here installs it on the next `chezmoi apply`;
#   - removing one UNINSTALLS it -- but ONLY skills this file installed are ever
#     removed (tracked in the manifest); skills you add by hand are left alone.
# Caveat: identity is the skill NAME, so hand-adding a skill whose name collides
# with a curated one makes it look "ours" (it would be removed if dropped here).
#
# Notes:
#   - Five mattpocock skills (grilling, grill-me, code-review,
#     resolving-merge-conflicts) plus shadcn/improve's `improve` share names with
#     Claude Code built-ins and deliberately OVERRIDE them.
#   - The security skill is sourced from our fork ax-at/better-auth-skills, not
#     upstream better-auth/skills.
#   - An openclaw-OWNED source repo would need --dangerously-accept-openclaw-risks
#     (a `use`-time gate); none of the repos below are openclaw-owned, and
#     installing TO the openclaw agent needs no special flag.
# ============================================================================

agents = ["universal", "claude-code", "openclaw", "hermes-agent", "pi"]

