# ============================================================================
# skills.toml  --  curated set of agent skills installed globally on this machine
# ----------------------------------------------------------------------------
# Installed by run_onchange_after_45-agent-skills.sh via the `skills` CLI
# (`npx skills`, https://github.com/vercel-labs/skills). Skills are installed at
# GLOBAL scope (`-g`, e.g. ~/.claude/skills) and SYMLINKED (the CLI default).
#
# `agents` below is the DEFAULT target set every skill installs to. It is
# independent of which agent CLIs are actually installed -- a skill is placed in
# an agent's global skills dir whether or not that agent exists yet.
#
# Each [[skills]] block is ONE skill (TOML array-of-tables; the array is
# `skills`, each block is one element). Fields:
#   repo   source the CLI clones from. Usually "owner/repo"; may be any git
#          source the CLI accepts (full URL, GitLab, direct path) -- use a
#          branch URL to pin a skill, since the CLI has no @tag/#ref syntax.
#   skill  the skill NAME within that repo. This is the identity key used for
#          install AND removal AND the applied-manifest, so it must be unique.
#   agents OPTIONAL per-skill override. Omitted -> installs to every agent in the
#          top-level `agents` list. Present -> installs ONLY to those agents.
#
# The install script RECONCILES against ~/.local/state/dotfiles/skills.applied:
# adding an entry installs it, and REMOVING an entry here UNINSTALLS it on the
# next `chezmoi apply` (only skills this file installed are ever removed --
# skills you add by hand are left untouched).
#
# Note: five mattpocock skills (grilling, grill-me, code-review,
# resolving-merge-conflicts, improve) share names with Claude Code built-ins and
# deliberately OVERRIDE them. `improve` also ships from shadcn/improve.
# ============================================================================

agents = ["universal", "claude-code", "openclaw", "hermes-agent", "pi"]

