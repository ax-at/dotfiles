# Starship prompt — lean, fast, informative.
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
command_timeout = 1000

format = """
$directory$git_branch$git_status$nodejs$package$cmd_duration
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold yellow"

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
detect_files = ["package.json", ".nvmrc", ".node-version"]

[cmd_duration]
min_time = 2000
format = "[ $duration]($style)"
style = "bold yellow"

[package]
disabled = true
